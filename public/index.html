
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ouvidor.IA Premium</title>
  <style>
    :root{
      --bg:#0b1220; --panel:#111827; --text:#e5e7eb; --muted:#94a3b8;
      --blue:#2563eb; --green:#22c55e; --yellow:#eab308; --red:#ef4444; --border:#243244;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:#0b1220;color:#e5e7eb}
    .wrap{max-width:1100px;margin:0 auto;padding:20px}
    .card{background:#111827;border:1px solid #243244;border-radius:18px;padding:18px;margin-bottom:16px}
    .hero{text-align:center}
    .row{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:18px}
    button{border:none;border-radius:14px;padding:14px 18px;font-size:16px;font-weight:700;cursor:pointer}
    .primary{background:#2563eb;color:#fff}
    .danger{background:#b91c1c;color:#fff}
    .ghost{background:#1f2937;color:#fff;border:1px solid #334155}
    button[disabled]{opacity:.55;cursor:not-allowed}
    .metric{font-size:40px;font-weight:800}
    .muted,.small{color:#94a3b8;line-height:1.45}
    .small{font-size:12px}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
    .col-12{grid-column:span 12}
    .col-8{grid-column:span 8}
    .col-6{grid-column:span 6}
    .col-4{grid-column:span 4}
    .col-3{grid-column:span 3}
    @media(max-width:900px){.col-8,.col-6,.col-4,.col-3{grid-column:span 12}}
    input, textarea, select{width:100%;padding:12px;border-radius:12px;border:1px solid #334155;background:#0f172a;color:#fff}
    .hidden{display:none}
    .list{display:grid;gap:10px}
    .item{padding:12px;border:1px solid #243244;border-radius:14px;background:#0b1220}
    .tag{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800}
    .green{background:rgba(34,197,94,.15);color:#22c55e}
    .yellow{background:rgba(234,179,8,.15);color:#eab308}
    .red{background:rgba(239,68,68,.15);color:#ef4444}
    .voice-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    @media(max-width:800px){.voice-grid{grid-template-columns:1fr}}
    table{width:100%;border-collapse:collapse}
    th,td{border:1px solid #243244;padding:10px;text-align:left;vertical-align:top}
    th{background:#0f172a}
    canvas{width:100%;height:220px;background:#0b1220;border-radius:16px;border:1px solid #243244}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .nps-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:8px}
    @media(max-width:700px){.nps-grid{grid-template-columns:repeat(5,1fr)}}
    .slider-wrap{margin-bottom:14px}
    .slider-wrap label{display:block;margin-bottom:6px}
    input[type="range"]{padding:0}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card hero">
    <h1>Ouvidor.IA Premium</h1>
    <div class="muted">Versão premium para teste com professores reais.</div>

    <div class="controls">
      <button id="startBtn" class="primary">INICIAR AULA</button>
      <button id="stopBtn" class="danger" disabled>ENCERRAR AULA</button>
    </div>

    <div id="timer" class="metric" style="margin-top:14px;">00:00</div>
    <div id="status" class="muted">Aguardando início.</div>
  </div>

  <div class="card">
    <div class="row">
      <strong>Configurar aula (opcional)</strong>
      <button id="toggleConfigBtn" class="ghost">Mostrar / ocultar</button>
    </div>
    <div id="configBlock" class="hidden" style="margin-top:16px;">
      <div class="grid">
        <div class="col-4"><label>Instituição</label><input id="cfgInstitution" /></div>
        <div class="col-4"><label>Turma</label><input id="cfgClass" /></div>
        <div class="col-4"><label>Disciplina</label><input id="cfgSubject" /></div>
        <div class="col-4"><label>Tema da aula</label><input id="cfgTopic" /></div>
        <div class="col-4"><label>Aluno específico</label><input id="cfgStudent" /></div>
        <div class="col-4"><label>Data</label><input id="cfgDate" /></div>
      </div>
      <div class="controls">
        <button class="ghost" id="saveConfigBtn">Salvar configuração</button>
      </div>
      <div class="small">Esses dados ficam salvos no dispositivo e ajudam a IA a contextualizar o feedback.</div>
    </div>

    <div id="savedConfigPreview" class="small" style="margin-top:12px;">Nenhuma configuração prévia.</div>
  </div>

  <div id="resultBlock" class="hidden"></div>

  <div id="historyBlock" class="hidden"></div>
</div>

<script>
  const STORAGE_KEY = "ouvidor_ia_premium_history";
  const CONFIG_KEY = "ouvidor_ia_premium_config";

  let recorder = null;
  let stream = null;
  let chunks = [];
  let startTime = null;
  let timerInterval = null;

  let audioContext = null;
  let analyser = null;
  let sourceNode = null;
  let frameId = null;
  let secondTimer = null;
  let perSecondDb = [];
  let currentSecondPeak = 25;

  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const timerEl = document.getElementById("timer");
  const statusEl = document.getElementById("status");
  const resultBlock = document.getElementById("resultBlock");
  const historyBlock = document.getElementById("historyBlock");

  const toggleConfigBtn = document.getElementById("toggleConfigBtn");
  const configBlock = document.getElementById("configBlock");
  const saveConfigBtn = document.getElementById("saveConfigBtn");
  const savedConfigPreview = document.getElementById("savedConfigPreview");

  const cfgInstitution = document.getElementById("cfgInstitution");
  const cfgClass = document.getElementById("cfgClass");
  const cfgSubject = document.getElementById("cfgSubject");
  const cfgTopic = document.getElementById("cfgTopic");
  const cfgStudent = document.getElementById("cfgStudent");
  const cfgDate = document.getElementById("cfgDate");

  function pad(n){ return String(n).padStart(2,"0"); }
  function fmtDuration(seconds){ const m=Math.floor(seconds/60), s=seconds%60; return `${pad(m)}:${pad(s)}`; }
  function escapeHtml(str=""){ return str.replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m])); }
  function colorBand(db){ if(db <= 40) return {key:"Verde", cls:"green", text:"Ambiente adequado"}; if(db <= 50) return {key:"Amarela", cls:"yellow", text:"Atenção ao ruído"}; return {key:"Vermelha", cls:"red", text:"Ruído elevado"}; }
  function getHistory(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; } }
  function saveHistory(arr){ localStorage.setItem(STORAGE_KEY, JSON.stringify(arr.slice(0, 10))); }
  function getConfig(){ try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || "{}"); } catch { return {}; } }
  function saveConfig(obj){ localStorage.setItem(CONFIG_KEY, JSON.stringify(obj)); }

  function renderSavedConfigPreview() {
    const cfg = getConfig();
    const parts = [];
    if (cfg.institution) parts.push(`Instituição: ${cfg.institution}`);
    if (cfg.className) parts.push(`Turma: ${cfg.className}`);
    if (cfg.subject) parts.push(`Disciplina: ${cfg.subject}`);
    if (cfg.topic) parts.push(`Tema: ${cfg.topic}`);
    if (cfg.student) parts.push(`Aluno: ${cfg.student}`);
    if (cfg.date) parts.push(`Data: ${cfg.date}`);
    savedConfigPreview.textContent = parts.length ? parts.join(" • ") : "Nenhuma configuração prévia.";
  }

  function loadConfigIntoFields() {
    const cfg = getConfig();
    cfgInstitution.value = cfg.institution || "";
    cfgClass.value = cfg.className || "";
    cfgSubject.value = cfg.subject || "";
    cfgTopic.value = cfg.topic || "";
    cfgStudent.value = cfg.student || "";
    cfgDate.value = cfg.date || "";
  }

  function readConfigFromFields() {
    return {
      institution: cfgInstitution.value.trim(),
      className: cfgClass.value.trim(),
      subject: cfgSubject.value.trim(),
      topic: cfgTopic.value.trim(),
      student: cfgStudent.value.trim(),
      date: cfgDate.value.trim(),
    };
  }

  function bucketByMinute(samples) {
    const out = [];
    if (!samples.length) return out;
    const size = samples.length < 60 ? Math.max(5, Math.ceil(samples.length / Math.min(samples.length, 6))) : 60;
    for (let i = 0; i < samples.length; i += size) {
      const chunk = samples.slice(i, i + size);
      const avg = Math.round(chunk.reduce((a, b) => a + b, 0) / chunk.length);
      out.push(avg);
    }
    return out;
  }

  function avg(arr){ return arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0; }

  function drawNoiseChart(canvasId, samples, xPrefix="m") {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;

    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.max(320, Math.floor(rect.width * 2));
    canvas.height = 440;

    const ctx = canvas.getContext("2d");
    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0, 0, w, h);

    const yForDb = (db) => h - ((db - 25) / (85 - 25)) * (h - 50) - 20;

    [["rgba(34,197,94,.15)",25,40],["rgba(234,179,8,.15)",40,50],["rgba(239,68,68,.15)",50,85]].forEach(([color, from, to]) => {
      const y1 = yForDb(to);
      const y2 = yForDb(from);
      ctx.fillStyle = color;
      ctx.fillRect(50, y1, w - 70, y2 - y1);
    });

    ctx.strokeStyle = "#3a4b67";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(50,20);
    ctx.lineTo(50,h-30);
    ctx.lineTo(w-20,h-30);
    ctx.stroke();

    ctx.fillStyle = "#94a3b8";
    ctx.font = "20px Arial";
    [30,40,50,60,70,80].forEach(db=>{
      const y = yForDb(db);
      ctx.fillText(String(db), 6, y + 6);
      ctx.strokeStyle = "rgba(148,163,184,.18)";
      ctx.beginPath();
      ctx.moveTo(50,y);
      ctx.lineTo(w-20,y);
      ctx.stroke();
    });

    if (!samples.length) {
      ctx.fillStyle = "#94a3b8";
      ctx.fillText("Sem dados suficientes para gráfico.", 70, h/2);
      return;
    }

    const maxX = samples.length - 1 || 1;
    ctx.strokeStyle = "#60a5fa";
    ctx.lineWidth = 4;
    ctx.beginPath();
    samples.forEach((db, i) => {
      const x = 60 + (i / maxX) * (w - 100);
      const y = yForDb(db);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  async function startRecording() {
    resultBlock.classList.add("hidden");
    historyBlock.classList.add("hidden");
    chunks = [];
    perSecondDb = [];
    currentSecondPeak = 25;

    stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false
      }
    });

    const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
      ? "audio/webm;codecs=opus"
      : "audio/webm";

    recorder = new MediaRecorder(stream, { mimeType });
    recorder.ondataavailable = (e) => {
      if (e.data.size > 0) chunks.push(e.data);
    };
    recorder.start();

    startTime = Date.now();
    startBtn.disabled = true;
    stopBtn.disabled = false;
    statusEl.textContent = "Captando aula...";

    timerInterval = setInterval(() => {
      timerEl.textContent = fmtDuration(Math.floor((Date.now() - startTime) / 1000));
    }, 500);

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    await audioContext.resume();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.2;
    sourceNode = audioContext.createMediaStreamSource(stream);
    sourceNode.connect(analyser);

    const data = new Float32Array(analyser.fftSize);

    function tick() {
      analyser.getFloatTimeDomainData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
      const rms = Math.sqrt(sum / data.length);
      let db = 35 + (Math.min(1, rms * 20) * 40);
      db = Math.round(Math.max(25, Math.min(85, db)));
      if (db > currentSecondPeak) currentSecondPeak = db;
      frameId = requestAnimationFrame(tick);
    }

    frameId = requestAnimationFrame(tick);

    secondTimer = setInterval(() => {
      perSecondDb.push(currentSecondPeak);
      currentSecondPeak = 25;
      statusEl.textContent = `Captando aula... Ruído atual ${perSecondDb[perSecondDb.length - 1]} dB(A)`;
    }, 1000);
  }

  async function stopRecording() {
    stopBtn.disabled = true;
    statusEl.textContent = "Processando com IA...";

    recorder.stop();

    recorder.onstop = async () => {
      clearInterval(timerInterval);
      cancelAnimationFrame(frameId);
      clearInterval(secondTimer);

      stream.getTracks().forEach((t) => t.stop());

      const blob = new Blob(chunks, { type: chunks[0]?.type || "audio/webm" });
      const fd = new FormData();
      fd.append("audio", blob, "aula.webm");

      const cfg = getConfig();
      fd.append("institution", cfg.institution || "");
      fd.append("className", cfg.className || "");
      fd.append("subject", cfg.subject || "");
      fd.append("topic", cfg.topic || "");
      fd.append("student", cfg.student || "");
      fd.append("date", cfg.date || "");

      let data;
      try {
        const resp = await fetch("/analyze", { method: "POST", body: fd });
        data = await resp.json();
      } catch (e) {
        data = {
          error: "Falha ao conectar com o servidor.",
          detail: String(e.message || e),
        };
      }

      const durationSec = Math.max(1, Math.floor((Date.now() - startTime) / 1000));
      const minuteSamples = bucketByMinute(perSecondDb);
      const avgDb = minuteSamples.length ? Math.round(minuteSamples.reduce((a,b)=>a+b,0)/minuteSamples.length) : 0;
      const peakDb = perSecondDb.length ? Math.max(...perSecondDb) : 0;
      const band = colorBand(avgDb);

      const record = {
        id: "aula_" + Date.now(),
        createdAt: new Date().toISOString(),
        config: cfg,
        durationSec,
        avgDb,
        peakDb,
        perSecondDb,
        minuteSamples,
        transcript: data.transcript || "",
        tldr: data.tldr || "",
        alerts: data.alerts || [],
        gagne: data.gagne || [],
        commands: data.commands || [],
        pendings: data.pendings || [],
        socio: {
          motivacao: 5,
          satisfacao: 5,
          fisico: 5,
          mental: 5,
          infraestrutura: 5
        },
        debug: data.debug || "—",
        error: data.error || "",
        detail: data.detail || ""
      };

      const history = getHistory();
      history.unshift(record);
      saveHistory(history);

      renderRecent(record, band);
      renderHistory();

      timerEl.textContent = "00:00";
      statusEl.textContent = "Aula encerrada.";
      startBtn.disabled = false;
    };
  }

  function socioColor(value) {
    if (value <= 3) return "red";
    if (value <= 7) return "yellow";
    return "green";
  }

  function renderRecent(record, band) {
    resultBlock.classList.remove("hidden");

    resultBlock.innerHTML = `
      <div class="grid">
        <div class="col-12 card">
          <div class="row">
            <div>
              <h2>Resumo da aula recém gravada</h2>
              <div class="small">${new Date(record.createdAt).toLocaleString("pt-BR")}</div>
            </div>
            <div class="tag ${band.cls}">${band.key} • ${band.text}</div>
          </div>
        </div>

        <div class="col-4 card">
          <div class="small">TL;DR</div>
          <div class="item">${escapeHtml(record.tldr || "Sem resumo.")}</div>
        </div>

        <div class="col-4 card">
          <div class="small">Alertas</div>
          <div class="list">
            ${record.alerts?.length ? record.alerts.map(a => `<div class="item">${escapeHtml(a)}</div>`).join("") : `<div class="item">Sem alertas.</div>`}
          </div>
        </div>

        <div class="col-4 card">
          <div class="small">Ruído</div>
          <div class="item">Médio: ${record.avgDb} dB(A)</div>
          <div class="item">Pico: ${record.peakDb} dB(A)</div>
          <canvas id="recentNoiseChart"></canvas>
        </div>

        <div class="col-12 card">
          <h3>Tabela pedagógica — Gagné (9 etapas)</h3>
          <table>
            <thead>
              <tr>
                <th>Etapa</th>
                <th>Evidência</th>
                <th>Avaliação</th>
                <th>Observação</th>
              </tr>
            </thead>
            <tbody>
              ${
                record.gagne?.length
                  ? record.gagne.map(row => `
                    <tr>
                      <td>${escapeHtml(row.etapa || "")}</td>
                      <td>${escapeHtml(row.evidencia || "")}</td>
                      <td>${escapeHtml(row.avaliacao || "")}</td>
                      <td>${escapeHtml(row.observacao || "")}</td>
                    </tr>
                  `).join("")
                  : `<tr><td colspan="4">Sem análise pedagógica.</td></tr>`
              }
            </tbody>
          </table>
        </div>

        <div class="col-6 card">
          <h3>Comandos</h3>
          <div class="list">
            ${record.commands?.length ? record.commands.map(c => `<div class="item">${escapeHtml(c)}</div>`).join("") : `<div class="item">Nenhum comando detectado.</div>`}
          </div>
        </div>

        <div class="col-6 card">
          <h3>Pendências</h3>
          <div class="list">
            ${record.pendings?.length ? record.pendings.map(p => `<div class="item">${escapeHtml(p)}</div>`).join("") : `<div class="item">Nenhuma pendência detectada.</div>`}
          </div>
        </div>

        <div class="col-12 card">
          <h3>Transcrição</h3>
          <div class="item">${escapeHtml(record.transcript || "Sem transcrição.")}</div>
        </div>

        <div class="col-12 card">
          <h3>Refinar dados da aula (opcional)</h3>
          <div class="grid">
            <div class="col-4"><label>Instituição</label><input id="postInstitution" value="${escapeHtml(record.config.institution || "")}" /></div>
            <div class="col-4"><label>Turma</label><input id="postClass" value="${escapeHtml(record.config.className || "")}" /></div>
            <div class="col-4"><label>Disciplina</label><input id="postSubject" value="${escapeHtml(record.config.subject || "")}" /></div>
            <div class="col-4"><label>Tema</label><input id="postTopic" value="${escapeHtml(record.config.topic || "")}" /></div>
            <div class="col-4"><label>Aluno</label><input id="postStudent" value="${escapeHtml(record.config.student || "")}" /></div>
            <div class="col-4"><label>Data</label><input id="postDate" value="${escapeHtml(record.config.date || "")}" /></div>
          </div>
          <div class="small" style="margin-top:10px;">Você pode ajustar os campos depois da aula. Eles serão salvos no histórico deste dispositivo.</div>
        </div>

        <div class="col-12 card">
          <h3>Check-out socioemocional (opcional)</h3>
          ${renderSlider("Motivação prévia", "motivacao", record.socio.motivacao)}
          ${renderSlider("Satisfação final", "satisfacao", record.socio.satisfacao)}
          ${renderSlider("Estado físico", "fisico", record.socio.fisico)}
          ${renderSlider("Estado mental", "mental", record.socio.mental)}
          ${renderSlider("Infraestrutura funcionando", "infraestrutura", record.socio.infraestrutura)}
          <div class="controls">
            <button class="ghost" id="saveAfterBtn">Salvar dados desta aula</button>
          </div>
        </div>

        <div class="col-12 card">
          <h3>Diagnóstico técnico</h3>
          <div class="item">debug: ${escapeHtml(record.debug || "—")}</div>
          <div class="item">error: ${escapeHtml(record.error || "—")}</div>
          <div class="item">detail: ${escapeHtml(record.detail || "—")}</div>
        </div>
      </div>
    `;

    setTimeout(() => drawNoiseChart("recentNoiseChart", record.perSecondDb.length < 60 ? record.perSecondDb : record.minuteSamples), 50);

    document.getElementById("saveAfterBtn").onclick = () => {
      const history = getHistory();
      const idx = history.findIndex(x => x.id === record.id);
      if (idx < 0) return;

      history[idx].config = {
        institution: document.getElementById("postInstitution").value.trim(),
        className: document.getElementById("postClass").value.trim(),
        subject: document.getElementById("postSubject").value.trim(),
        topic: document.getElementById("postTopic").value.trim(),
        student: document.getElementById("postStudent").value.trim(),
        date: document.getElementById("postDate").value.trim(),
      };

      history[idx].socio = {
        motivacao: Number(document.getElementById("sl-motivacao").value),
        satisfacao: Number(document.getElementById("sl-satisfacao").value),
        fisico: Number(document.getElementById("sl-fisico").value),
        mental: Number(document.getElementById("sl-mental").value),
        infraestrutura: Number(document.getElementById("sl-infraestrutura").value),
      };

      saveHistory(history);
      saveConfig(history[idx].config);
      renderSavedConfigPreview();
      renderHistory();
      alert("Dados da aula salvos.");
    };
  }

  function renderSlider(label, id, value) {
    return `
      <div class="slider-wrap">
        <label>${label}: <strong id="lb-${id}">${value}</strong></label>
        <input type="range" min="1" max="10" value="${value}" id="sl-${id}" oninput="document.getElementById('lb-${id}').innerText=this.value" />
      </div>
    `;
  }

  function renderHistory() {
    const history = getHistory();
    historyBlock.classList.remove("hidden");

    if (!history.length) {
      historyBlock.innerHTML = `<div class="card">Ainda não há aulas no histórico.</div>`;
      return;
    }

    const avgDbVal = avg(history.map(h => h.avgDb));
    const avgMotiv = avg(history.map(h => h.socio?.motivacao || 0));
    const avgSat = avg(history.map(h => h.socio?.satisfacao || 0));

    historyBlock.innerHTML = `
      <div class="card">
        <h2>Dashboard histórico</h2>
        <div class="small">Começa pelos gráficos. Ao clicar, refinamos depois.</div>
      </div>

      <div class="grid">
        <div class="col-4 card">
          <div class="small">Ruído médio histórico</div>
          <div class="metric">${avgDbVal} dB(A)</div>
        </div>
        <div class="col-4 card">
          <div class="small">Motivação média</div>
          <div class="metric">${avgMotiv}</div>
        </div>
        <div class="col-4 card">
          <div class="small">Satisfação média</div>
          <div class="metric">${avgSat}</div>
        </div>

        <div class="col-12 card">
          <h3>Últimas aulas</h3>
          <div class="list">
            ${
              history.map(h => `
                <div class="item">
                  <strong>${escapeHtml(h.config?.topic || "Aula sem tema")}</strong><br/>
                  <span class="small">${new Date(h.createdAt).toLocaleString("pt-BR")}</span><br/>
                  <span class="small">${escapeHtml(h.tldr || "Sem TL;DR")}</span>
                </div>
              `).join("")
            }
          </div>
        </div>
      </div>
    `;
  }

  toggleConfigBtn.onclick = () => {
    configBlock.classList.toggle("hidden");
  };

  saveConfigBtn.onclick = () => {
    const cfg = readConfigFromFields();
    saveConfig(cfg);
    renderSavedConfigPreview();
    alert("Configuração salva no dispositivo.");
  };

  startBtn.onclick = startRecording;
  stopBtn.onclick = stopRecording;

  loadConfigIntoFields();
  renderSavedConfigPreview();
  renderHistory();
</script>
</body>
</html>
