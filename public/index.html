
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orelho</title>
  <style>
    :root{
      --bg:#f7f9fc;
      --panel:#ffffff;
      --panel-soft:#f6f8fb;
      --text:#163243;
      --muted:#6b7280;
      --blue:#1f6a8a;
      --blue-strong:#14536d;
      --orange:#ef8b6c;
      --red:#dc2626;
      --green:#16a34a;
      --yellow:#d97706;
      --border:#dbe3ef;
      --shadow:0 10px 26px rgba(15,23,42,.06);
      --radius:20px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:20px 16px 40px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    .hero{
      text-align:center;
      padding:26px 18px 20px;
    }

    .brand-logo{
      width:220px;
      max-width:75%;
      display:block;
      margin:0 auto 10px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.5;
    }

    .welcome{
      font-size:18px;
      font-weight:700;
      margin:12px 0 6px;
      color:var(--blue-strong);
    }

    .controls{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:18px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:.15s ease;
    }

    button:hover{transform:translateY(-1px)}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none}

    .primary{background:var(--blue);color:#fff}
    .danger{background:var(--orange);color:#fff}
    .ghost{
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }

    .metric{
      font-size:44px;
      font-weight:800;
      margin-top:14px;
      letter-spacing:-.02em;
    }

    .muted,.small{
      color:var(--muted);
      line-height:1.45;
    }

    .small{font-size:12px}

    .connection-inline{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
    }

    .status-live{
      margin-top:8px;
      font-size:15px;
      font-weight:700;
      color:var(--blue-strong);
    }

    .hidden{display:none}

    .field-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:14px;
    }

    @media(max-width:850px){
      .field-grid{grid-template-columns:1fr}
    }

    .field label{
      display:block;
      margin-bottom:6px;
      font-weight:700;
      font-size:14px;
    }

    .input-row{
      display:flex;
      gap:8px;
      align-items:center;
    }

    input, textarea, select{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      outline:none;
      font-size:14px;
    }

    textarea{
      min-height:88px;
      resize:vertical;
    }

    input::placeholder, textarea::placeholder{
      color:#9aa5b5;
    }

    .mic-btn{
      min-width:44px;
      width:44px;
      height:44px;
      padding:0;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
    }

    .voice-help{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
    }

    .range-wrap{
      margin-bottom:16px;
    }

    .range-wrap label{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
      font-size:14px;
      font-weight:700;
    }

    input[type="range"]{
      -webkit-appearance:none;
      appearance:none;
      height:10px;
      padding:0;
      border:none;
      border-radius:999px;
      background:#d1d5db;
    }

    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      border:2px solid rgba(0,0,0,.18);
      box-shadow:0 2px 6px rgba(0,0,0,.12);
    }

    input[type="range"]::-moz-range-thumb{
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      border:2px solid rgba(0,0,0,.18);
      box-shadow:0 2px 6px rgba(0,0,0,.12);
    }

    .top-line{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .gagne-block{
      border:1px solid var(--border);
      border-radius:14px;
      background:var(--panel-soft);
      padding:14px;
      margin-bottom:10px;
    }

    .gagne-block strong{
      display:block;
      margin-bottom:8px;
    }

    .gagne-line{
      margin-bottom:6px;
      font-size:14px;
      line-height:1.45;
    }

    .action-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-top:8px;
    }

    @media(max-width:700px){
      .action-grid{grid-template-columns:1fr}
    }

    .action-card{
      border:1px solid var(--border);
      background:var(--panel-soft);
      border-radius:16px;
      padding:14px;
    }

    .action-card button{
      width:100%;
      margin-bottom:8px;
    }

    .pending-card{
      border:2px dashed #cbd5e1;
      background:#f8fafc;
    }

    .filter-toggle{
      margin-top:12px;
    }

    .filter-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:12px;
      margin-top:16px;
    }

    @media(max-width:1100px){
      .filter-grid{grid-template-columns:repeat(3,1fr)}
    }

    @media(max-width:700px){
      .filter-grid{grid-template-columns:1fr}
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:16px;
    }

    .col-12{grid-column:span 12}
    .col-6{grid-column:span 6}

    @media(max-width:900px){
      .col-6{grid-column:span 12}
    }

    .chart-card h3{
      margin:0 0 10px;
      font-size:16px;
    }

    .chart-wrap{
      width:100%;
      overflow:hidden;
    }

    canvas{
      width:100%;
      height:250px;
      background:#fff;
      border-radius:14px;
      border:1px solid var(--border);
      display:block;
    }

    .history-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:6px;
    }

    .audio-modal{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.42);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:9999;
    }

    .audio-modal-card{
      background:#fff;
      border-radius:18px;
      padding:18px;
      max-width:500px;
      width:100%;
      box-shadow:0 18px 48px rgba(15,23,42,.18);
    }

    .audio-progress{
      width:100%;
      height:10px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
      margin:14px 0 10px;
    }

    .audio-progress-bar{
      height:100%;
      width:0%;
      background:var(--blue);
    }

    .audio-time{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      color:var(--muted);
      margin-bottom:14px;
    }

    .section-title{
      font-size:13px;
      font-weight:700;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.04em;
      margin-bottom:8px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card hero" id="heroCard">
    <img src="orelho-logo.png" alt="Orelho" class="brand-logo" />
    <div class="welcome">Lá vamos nós. Grave, analise, avalie. Estamos juntos</div>

    <div class="controls">
      <button id="startBtn" class="primary">GRAVAR</button>
      <button id="stopBtn" class="danger" disabled>ENCERRAR</button>
    </div>

    <div id="timer" class="metric">00:00</div>
    <div id="statusLive" class="status-live">Aguardando início</div>
    <div id="connectionInline" class="connection-inline"></div>
  </div>

  <div class="card" id="instructionsCard">
    <div class="section-title">Depois de encerrar, você poderá:</div>
    <div class="muted">
      → Inserir detalhes sobre a gravação<br />
      → Analisar e receber feedbacks do Orelho por I.A.<br />
      → Fazer uma autoavaliação<br />
      → Atualizar seu histórico<br />
      → Salvar, deletar, compartilhar.
    </div>
  </div>

  <div id="postRecordBlock" class="hidden"></div>
  <div id="analysisBlock" class="hidden"></div>
  <div id="historyBlock" class="hidden"></div>
  <div id="audioModalRoot"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  const LEGACY_STORAGE_KEY = "ouvidor_ia_premium_history_v6";
  const CONFIG_KEY = "ouvidor_ia_premium_config_v6";
  const DB_NAME = "orelho_app_v3";
  const DB_VERSION = 1;
  const RECORDS_STORE = "records";
  const AUDIO_STORE = "audios";
  const MIGRATION_FLAG = "orelho_v3_migrated";
  const SPECIAL_ANALYSIS_LIMIT = 1;

  let recorder = null;
  let stream = null;
  let chunks = [];
  let startTime = null;
  let timerInterval = null;
  let currentAudioController = null;
  let activeVoiceRecognition = null;
  let activeVoiceTarget = null;

  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const timerEl = document.getElementById("timer");
  const statusLive = document.getElementById("statusLive");
  const connectionInline = document.getElementById("connectionInline");
  const instructionsCard = document.getElementById("instructionsCard");
  const postRecordBlock = document.getElementById("postRecordBlock");
  const analysisBlock = document.getElementById("analysisBlock");
  const historyBlock = document.getElementById("historyBlock");
  const audioModalRoot = document.getElementById("audioModalRoot");

  function pad(n){ return String(n).padStart(2,"0"); }
  function fmtDuration(seconds){ const m=Math.floor(seconds/60), s=seconds%60; return `${pad(m)}:${pad(s)}`; }
  function escapeHtml(str=""){ return str.replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m])); }
  function avg(arr){ return arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length) : 0; }

  function bytesToMB(bytes = 0) {
    return (bytes / (1024 * 1024)).toFixed(2);
  }

  function formatShortDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" });
  }

  function normalizePart(value, fallback) {
    const clean = (value || "")
      .toString()
      .trim()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "")
      .toLowerCase();
    return clean || fallback;
  }

  function buildBaseName(record) {
    const d = new Date(record.createdAt || Date.now());
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const cfg = record.config || {};

    return [
      `${yyyy}-${mm}-${dd}`,
      normalizePart(cfg.localInstitution, "sem-local"),
      normalizePart(cfg.yearLevel, "sem-ano-letivo"),
      normalizePart(cfg.courseId, "sem-curso"),
      normalizePart(cfg.classId, "sem-turma"),
      normalizePart(cfg.subject, "sem-disciplina"),
      normalizePart(cfg.topicObjective, "sem-tema")
    ].join("__");
  }

  function renderSlider(label, id, value) {
    return `
      <div class="range-wrap">
        <label>
          <span>${label}</span>
          <strong id="lb-${id}">${value}</strong>
        </label>
        <input
          type="range"
          min="1"
          max="10"
          value="${value}"
          id="sl-${id}"
          oninput="
            document.getElementById('lb-${id}').innerText=this.value;
            this.style.background = (this.value <= 3 ? '#ef4444' : (this.value <= 7 ? '#eab308' : '#22c55e'));
          "
        />
      </div>
    `;
  }

  function applyRangeColor(el) {
    const v = Number(el.value || 5);
    el.style.background = v <= 3 ? "#ef4444" : (v <= 7 ? "#eab308" : "#22c55e");
  }

  function getConfig() {
    try {
      return JSON.parse(localStorage.getItem(CONFIG_KEY) || "{}");
    } catch {
      return {};
    }
  }

  function saveConfig(obj) {
    localStorage.setItem(CONFIG_KEY, JSON.stringify(obj));
  }

  function renderConnectionStatus() {
    connectionInline.textContent = navigator.onLine
      ? "Conexão disponível."
      : "Sem conexão. Você pode gravar agora e analisar depois.";
  }

  function readConfigFromSection(prefix) {
    return {
      localInstitution: document.getElementById(prefix + "LocalInstitution")?.value.trim() || "",
      yearLevel: document.getElementById(prefix + "YearLevel")?.value.trim() || "",
      courseId: document.getElementById(prefix + "CourseId")?.value.trim() || "",
      classId: document.getElementById(prefix + "ClassId")?.value.trim() || "",
      subject: document.getElementById(prefix + "Subject")?.value.trim() || "",
      topicObjective: document.getElementById(prefix + "TopicObjective")?.value.trim() || "",
      specificStudents: document.getElementById(prefix + "SpecificStudents")?.value.trim() || "",
      durationMinutes: document.getElementById(prefix + "DurationMinutes")?.value.trim() || ""
    };
  }

  function fillConfigInSection(prefix, cfg = {}) {
    const set = (id, val) => {
      const el = document.getElementById(prefix + id);
      if (el) el.value = val || "";
    };
    set("LocalInstitution", cfg.localInstitution);
    set("YearLevel", cfg.yearLevel);
    set("CourseId", cfg.courseId);
    set("ClassId", cfg.classId);
    set("Subject", cfg.subject);
    set("TopicObjective", cfg.topicObjective);
    set("SpecificStudents", cfg.specificStudents);
    set("DurationMinutes", cfg.durationMinutes);
  }

  async function openAppDB() {
    return await new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(RECORDS_STORE)) {
          db.createObjectStore(RECORDS_STORE, { keyPath: "id" });
        }
        if (!db.objectStoreNames.contains(AUDIO_STORE)) {
          db.createObjectStore(AUDIO_STORE);
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function getAllRecords() {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(RECORDS_STORE, "readonly");
      const req = tx.objectStore(RECORDS_STORE).getAll();
      req.onsuccess = () => resolve((req.result || []).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
      req.onerror = () => reject(req.error);
    });
  }

  async function getRecord(id) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(RECORDS_STORE, "readonly");
      const req = tx.objectStore(RECORDS_STORE).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }

  async function putRecord(record) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(RECORDS_STORE, "readwrite");
      tx.objectStore(RECORDS_STORE).put(record);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function saveAudioBlob(id, blob) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE, "readwrite");
      tx.objectStore(AUDIO_STORE).put(blob, id);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function getAudioBlob(id) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE, "readonly");
      const req = tx.objectStore(AUDIO_STORE).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }

  async function deleteAudioBlob(id) {
    const db = await openAppDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE, "readwrite");
      tx.objectStore(AUDIO_STORE).delete(id);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function migrateLegacyHistoryIfNeeded() {
    if (localStorage.getItem(MIGRATION_FLAG) === "1") return;

    let legacy = [];
    try {
      legacy = JSON.parse(localStorage.getItem(LEGACY_STORAGE_KEY) || "[]");
    } catch {
      legacy = [];
    }

    if (legacy.length) {
      for (const item of legacy) {
        const existing = await getRecord(item.id);
        if (!existing) {
          item.socioSaved = item.socioSaved ?? true;
          item.specialAnalysis = item.specialAnalysis || null;
          await putRecord(item);
        }
      }
    }

    localStorage.setItem(MIGRATION_FLAG, "1");
  }

  function openVoiceForInput(targetId) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      alert("Seu navegador não oferece gravação por voz neste campo.");
      return null;
    }

    const rec = new SR();
    rec.lang = "pt-BR";
    rec.continuous = true;
    rec.interimResults = true;

    rec.onresult = (e) => {
      const texts = [];
      for (let i = 0; i < e.results.length; i++) {
        texts.push(e.results[i][0].transcript);
      }
      const el = document.getElementById(targetId);
      if (el) el.value = texts.join(" ").trim();
    };

    return rec;
  }

  function bindHoldToTalk(container = document) {
    container.querySelectorAll(".mic-hold").forEach((btn) => {
      const target = btn.dataset.target;
      if (!target) return;

      const start = (ev) => {
        ev.preventDefault();
        if (activeVoiceRecognition) return;
        activeVoiceTarget = target;
        const recognition = openVoiceForInput(target);
        if (!recognition) return;
        activeVoiceRecognition = recognition;
        btn.textContent = "🔴";
        try { recognition.start(); } catch {}
      };

      const stop = (ev) => {
        if (ev) ev.preventDefault();
        if (!activeVoiceRecognition) return;
        try { activeVoiceRecognition.stop(); } catch {}
        activeVoiceRecognition = null;
        activeVoiceTarget = null;
        btn.textContent = "🎤";
      };

      btn.onmousedown = start;
      btn.ontouchstart = start;
      btn.onmouseup = stop;
      btn.onmouseleave = stop;
      btn.ontouchend = stop;
      btn.ontouchcancel = stop;
    });
  }

  async function shareRecording(recordId) {
    const record = await getRecord(recordId);
    const blob = await getAudioBlob(recordId);
    if (!record || !blob) {
      alert("Gravação não encontrada.");
      return;
    }

    const fileName = `${buildBaseName(record)}__gravacao.webm`;
    const file = new File([blob], fileName, { type: blob.type || "audio/webm" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: "Gravação do Orelho",
          text: "Compartilhando gravação.",
        });
      } catch {}
      return;
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
    alert("Seu navegador baixou o arquivo para você compartilhar manualmente.");
  }

  async function openAudioPlayer(recordId) {
    const record = await getRecord(recordId);
    const blob = await getAudioBlob(recordId);

    if (!record || !blob) {
      alert("Gravação não encontrada.");
      return;
    }

    if (currentAudioController) {
      currentAudioController.close();
      currentAudioController = null;
    }

    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);

    audioModalRoot.innerHTML = `
      <div class="audio-modal" id="audioModal">
        <div class="audio-modal-card">
          <div class="top-line">
            <strong>Ouvir gravação</strong>
            <button class="ghost" id="closeAudioModalBtn">Fechar</button>
          </div>

          <div class="small" style="margin-top:8px;">${new Date(record.createdAt).toLocaleString("pt-BR")}</div>

          <div class="audio-progress">
            <div class="audio-progress-bar" id="audioProgressBar"></div>
          </div>

          <div class="audio-time">
            <span id="audioCurrentTime">00:00</span>
            <span id="audioDuration">00:00</span>
          </div>

          <input type="range" min="0" max="100" value="0" id="audioSeekBar" />

          <div class="controls">
            <button class="primary" id="playAudioBtn">Play</button>
            <button class="ghost" id="pauseAudioBtn">Pause</button>
            <button class="ghost" id="stopAudioBtn">Stop</button>
          </div>
        </div>
      </div>
    `;

    const modal = document.getElementById("audioModal");
    const progressBar = document.getElementById("audioProgressBar");
    const audioCurrentTime = document.getElementById("audioCurrentTime");
    const audioDuration = document.getElementById("audioDuration");
    const audioSeekBar = document.getElementById("audioSeekBar");

    const refresh = () => {
      const dur = audio.duration || 0;
      const cur = audio.currentTime || 0;
      const pct = dur ? (cur / dur) * 100 : 0;
      progressBar.style.width = pct + "%";
      audioSeekBar.value = pct;
      audioCurrentTime.textContent = fmtDuration(Math.floor(cur));
      audioDuration.textContent = fmtDuration(Math.floor(dur));
    };

    audio.addEventListener("timeupdate", refresh);
    audio.addEventListener("loadedmetadata", refresh);
    audio.addEventListener("ended", refresh);

    document.getElementById("playAudioBtn").onclick = () => audio.play();
    document.getElementById("pauseAudioBtn").onclick = () => audio.pause();
    document.getElementById("stopAudioBtn").onclick = () => {
      audio.pause();
      audio.currentTime = 0;
      refresh();
    };

    audioSeekBar.oninput = () => {
      const dur = audio.duration || 0;
      audio.currentTime = (Number(audioSeekBar.value) / 100) * dur;
    };

    const close = () => {
      audio.pause();
      audio.currentTime = 0;
      URL.revokeObjectURL(url);
      audioModalRoot.innerHTML = "";
    };

    document.getElementById("closeAudioModalBtn").onclick = close;
    modal.onclick = (e) => {
      if (e.target === modal) close();
    };

    currentAudioController = { close };
  }

  async function deleteRecordingForRecord(recordId) {
    const item = await getRecord(recordId);
    if (!item || !item.recorded) return;

    const ok = confirm("Deseja realmente deletar esta gravação? Essa ação remove o arquivo de áudio.");
    if (!ok) return;

    await deleteAudioBlob(recordId);
    item.recorded = false;
    item.audioSizeBytes = 0;
    await putRecord(item);

    if (item.analysisStatus === "analyzed") {
      renderAnalysis(item);
    } else {
      renderPostRecord(item);
    }

    await renderHistory();
    alert("Gravação deletada.");
  }

  async function analyzeRecord(recordId) {
    const record = await getRecord(recordId);
    if (!record) return;

    const blob = await getAudioBlob(record.id);

    if (!blob) {
      alert("Gravação não encontrada para análise.");
      return;
    }

    if (!navigator.onLine) {
      const note = document.getElementById("analyzeConnectionNote");
      if (note) note.textContent = "Sem conexão para analisar.";
      return;
    }

    const cfg = readConfigFromSection("post");
    record.config = cfg;
    saveConfig(cfg);
    await putRecord(record);

    statusLive.textContent = "Orelho trabalhando pra você. Pode levar alguns minutos";
    const note = document.getElementById("analyzeConnectionNote");
    if (note) note.textContent = "";

    const fd = new FormData();
    fd.append("audio", blob, "gravacao.webm");
    fd.append("localInstitution", record.config.localInstitution || "");
    fd.append("yearLevel", record.config.yearLevel || "");
    fd.append("courseId", record.config.courseId || "");
    fd.append("classId", record.config.classId || "");
    fd.append("subject", record.config.subject || "");
    fd.append("topicObjective", record.config.topicObjective || "");
    fd.append("specificStudents", record.config.specificStudents || "");
    fd.append("durationMinutes", record.config.durationMinutes || "");
    fd.append("systemDate", new Date(record.createdAt).toLocaleString("pt-BR"));

    let data;
    try {
      const resp = await fetch("/analyze", { method: "POST", body: fd });
      data = await resp.json();
    } catch (e) {
      data = {
        error: "Falha ao conectar com o servidor.",
      };
    }

    record.transcript = data.transcript || "";
    record.tldr = data.tldr || "";
    record.gagne = data.gagne || [];
    record.analysisStatus = data.error ? "failed" : "analyzed";
    record.analyzedAt = new Date().toISOString();

    await putRecord(record);

    if (record.analysisStatus === "analyzed") {
      renderAnalysis(record);
      await renderHistory();
      statusLive.textContent = "Gravação encerrada";
    } else {
      alert("Não foi possível analisar a gravação.");
      statusLive.textContent = "Gravação encerrada";
    }
  }

  async function runSpecialAnalysis(recordId) {
    const record = await getRecord(recordId);
    if (!record) return;

    const promptEl = document.getElementById("specialPrompt");
    const resultEl = document.getElementById("specialResult");
    const noteEl = document.getElementById("specialNote");

    const specialPrompt = (promptEl?.value || "").trim();

    if (!specialPrompt) {
      if (noteEl) noteEl.textContent = "Digite ou grave seu pedido especial.";
      return;
    }

    if (!record.transcript) {
      if (noteEl) noteEl.textContent = "A análise especial precisa da transcrição da gravação.";
      return;
    }

    if (!navigator.onLine) {
      if (noteEl) noteEl.textContent = "Sem conexão para analisar.";
      return;
    }

    if ((record.specialAnalysisCount || 0) >= SPECIAL_ANALYSIS_LIMIT && !record.specialAnalysis) {
      if (noteEl) noteEl.textContent = "Limite de 1 análise especial por gravação.";
      return;
    }

    if (noteEl) noteEl.textContent = "Orelho trabalhando pra você. Pode levar alguns minutos";
    if (resultEl) resultEl.innerHTML = "";

    let data;
    try {
      const resp = await fetch("/analyze-special", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          transcript: record.transcript,
          specialPrompt,
        }),
      });
      data = await resp.json();
    } catch (e) {
      data = { error: "Falha ao conectar com o servidor." };
    }

    if (data.error) {
      if (noteEl) noteEl.textContent = data.error;
      return;
    }

    record.specialAnalysis = {
      prompt: specialPrompt,
      result: data.result || "Sem resultado.",
      createdAt: new Date().toISOString(),
    };
    record.specialAnalysisCount = 1;
    await putRecord(record);

    if (resultEl) {
      resultEl.innerHTML = `
        <div class="gagne-block">
          <strong>Pergunta</strong>
          <div class="gagne-line">${escapeHtml(record.specialAnalysis.prompt)}</div>
          <strong style="margin-top:10px;">Resultado</strong>
          <div class="gagne-line">${escapeHtml(record.specialAnalysis.result)}</div>
        </div>
      `;
    }

    if (noteEl) noteEl.textContent = "Análise especial concluída.";
    await renderHistory();
  }

  function drawBarLineChart(canvasId, values, dates) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;

    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.max(420, Math.floor(rect.width * 2));
    canvas.height = 320;
    const ctx = canvas.getContext("2d");
    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0, 0, w, h);

    const marginLeft = 44;
    const marginRight = 28;
    const marginTop = 24;
    const marginBottom = 42;
    const chartW = w - marginLeft - marginRight;
    const chartH = h - marginTop - marginBottom;

    ctx.strokeStyle = "#d7dfeb";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(marginLeft, marginTop);
    ctx.lineTo(marginLeft, h - marginBottom);
    ctx.lineTo(w - marginRight, h - marginBottom);
    ctx.stroke();

    const midY = marginTop + chartH / 2;
    ctx.strokeStyle = "rgba(148,163,184,0.10)";
    ctx.beginPath();
    ctx.moveTo(marginLeft, midY);
    ctx.lineTo(w - marginRight, midY);
    ctx.stroke();

    [1,5,10].forEach((n) => {
      const y = marginTop + chartH - ((n - 1) / 9) * chartH;
      ctx.fillStyle = "#64748b";
      ctx.font = "12px Arial";
      ctx.fillText(String(n), 16, y + 4);
    });

    if (!values.length) {
      ctx.fillStyle = "#94a3b8";
      ctx.font = "16px Arial";
      ctx.fillText("Sem dados suficientes.", 64, h / 2);
      return;
    }

    const slotW = chartW / values.length;
    const barW = Math.max(10, slotW * 0.44);

    const progressive = [];
    let sum = 0;
    values.forEach((v, i) => {
      sum += v;
      progressive.push(sum / (i + 1));
    });

    values.forEach((v, i) => {
      const x = marginLeft + i * slotW + (slotW - barW) / 2;
      const barH = (v / 10) * chartH;
      const y = marginTop + chartH - barH;

      ctx.fillStyle = "#8fc5da";
      ctx.fillRect(x, y, barW, barH);

      const showLabelEvery = values.length > 14 ? Math.ceil(values.length / 8) : 1;
      if (i % showLabelEvery === 0) {
        ctx.save();
        ctx.translate(x + barW / 2, h - 18);
        ctx.rotate(-0.45);
        ctx.fillStyle = "#6b7280";
        ctx.font = "11px Arial";
        ctx.fillText(dates[i], 0, 0);
        ctx.restore();
      }
    });

    ctx.strokeStyle = "#ef8b6c";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    progressive.forEach((v, i) => {
      const x = marginLeft + i * slotW + slotW / 2;
      const y = marginTop + chartH - (v / 10) * chartH;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();

    const lastX = marginLeft + (values.length - 1) * slotW + slotW / 2;
    const lastY = marginTop + chartH - (progressive[progressive.length - 1] / 10) * chartH;
    ctx.fillStyle = "#ef8b6c";
    ctx.beginPath();
    ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = "12px Arial";
    ctx.fillText("média", Math.min(lastX + 8, w - 62), Math.max(lastY - 8, 18));
  }

  async function filteredHistory(filters) {
    const history = (await getAllRecords()).filter(x => x.analysisStatus === "analyzed" && x.socioSaved);
    return history.filter((item) => {
      const cfg = item.config || {};
      if (filters.localInstitution && cfg.localInstitution !== filters.localInstitution) return false;
      if (filters.yearLevel && cfg.yearLevel !== filters.yearLevel) return false;
      if (filters.courseId && cfg.courseId !== filters.courseId) return false;
      if (filters.classId && cfg.classId !== filters.classId) return false;
      if (filters.subject && cfg.subject !== filters.subject) return false;
      if (filters.topicObjective && cfg.topicObjective !== filters.topicObjective) return false;
      if (filters.specificStudents && cfg.specificStudents !== filters.specificStudents) return false;
      return true;
    }).sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
  }

            <strong>Pergunta</strong>
            <div class="gagne-line">${escapeHtml(record.specialAnalysis.prompt)}</div>
            <strong style="margin-top:10px;">Resultado</strong>
            <div class="gagne-line">${escapeHtml(record.specialAnalysis.result)}</div>
          </div>
        </div>
      ` : ""}

      <div class="audio-row">
        <button class="ghost" id="playHistoryAudioBtn" ${record.recorded ? "" : "disabled"}>Ouvir gravação</button>
        <button class="ghost" id="saveHistoryPdfBtn">Salvar PDF da análise</button>
      </div>
    `;

    document.getElementById("playHistoryAudioBtn").onclick = () => openAudioPlayer(record.id);
    document.getElementById("saveHistoryPdfBtn").onclick = () => generatePdf(record);
    document.getElementById("closeHistoryDetailBtn").onclick = () => {
      target.classList.add("hidden");
      target.innerHTML = "";
    };

    target.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function generatePdf(record) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const baseName = buildBaseName(record);
    const fileName = `${baseName}__analise.pdf`;

    let y = 20;
    const lineHeight = 7;
    const pageWidth = 180;

    function addWrapped(text, bold = false) {
      doc.setFont("helvetica", bold ? "bold" : "normal");
      const lines = doc.splitTextToSize(text, pageWidth);
      doc.text(lines, 15, y);
      y += lines.length * lineHeight + 2;
      if (y > 270) {
        doc.addPage();
        y = 20;
      }
    }

    doc.setFontSize(16);
    addWrapped("Relatório de análise da gravação", true);
    doc.setFontSize(11);

    addWrapped(`Data do sistema: ${new Date(record.createdAt).toLocaleString("pt-BR")}`);
    addWrapped(`Local/Instituição: ${record.config.localInstitution || "Não informado"}`);
    addWrapped(`Ano/Semestre Letivo; Ciclo; Módulo: ${record.config.yearLevel || "Não informado"}`);
    addWrapped(`Identificação do Curso: ${record.config.courseId || "Não informado"}`);
    addWrapped(`Identificação da Turma: ${record.config.classId || "Não informado"}`);
    addWrapped(`Disciplina: ${record.config.subject || "Não informado"}`);
    addWrapped(`Tema/Objetivo do Encontro: ${record.config.topicObjective || "Não informado"}`);
    addWrapped(`Aluno(s) Específico(s): ${record.config.specificStudents || "Não informado"}`);
    addWrapped(`Duração prevista do encontro: ${record.config.durationMinutes || "Não informado"}`);
    addWrapped(`Resumo rápido: ${record.tldr || "Sem resumo."}`);

    addWrapped("Feedback — Padrão Robert Gagné", true);
    (record.gagne || []).forEach((row, i) => {
      addWrapped(`${i + 1}. ${row.etapa}`, true);
      addWrapped(`Evidência: ${row.evidencia || "—"}`);
      addWrapped(`Avaliação: ${row.avaliacao || "—"}`);
      addWrapped(`Observações: ${row.observacao || "—"}`);
    });

    if (record.specialAnalysis) {
      addWrapped("Sua análise especial", true);
      addWrapped(`Pergunta: ${record.specialAnalysis.prompt}`);
      addWrapped(`Resultado: ${record.specialAnalysis.result}`);
    }

    addWrapped("Sua auto-avaliação", true);
    addWrapped(`Minha preparação prévia: ${record.socio?.preparacao ?? "-"}`);
    addWrapped(`Minha motivação prévia: ${record.socio?.motivacao ?? "-"}`);
    addWrapped(`Meu estado físico na gravação: ${record.socio?.fisico ?? "-"}`);
    addWrapped(`Meu estado mental/emocional na gravação: ${record.socio?.mental ?? "-"}`);
    addWrapped(`Infraestrutura funcionando na gravação: ${record.socio?.infraestrutura ?? "-"}`);
    addWrapped(`Minha satisfação final: ${record.socio?.satisfacao ?? "-"}`);

    doc.save(fileName);
  }

  async function renderHistory() {
    const history = (await getAllRecords()).filter(x => x.analysisStatus === "analyzed" && x.socioSaved);
    historyBlock.classList.remove("hidden");

    if (!history.length) {
      historyBlock.innerHTML = `<div class="card"><strong>Seu histórico</strong><div class="small" style="margin-top:8px;">As análises com autoavaliação salva aparecerão aqui.</div></div>`;
      return;
    }

    const all = history;
    const localInstitutionValues = uniqueValues(all, "localInstitution");
    const yearLevelValues = uniqueValues(all, "yearLevel");
    const courseIdValues = uniqueValues(all, "courseId");
    const classIdValues = uniqueValues(all, "classId");
    const subjectValues = uniqueValues(all, "subject");
    const topicObjectiveValues = uniqueValues(all, "topicObjective");
    const specificStudentsValues = uniqueValues(all, "specificStudents");

    historyBlock.innerHTML = `
      <div class="card">
        <div class="top-line">
          <strong>Seu histórico</strong>
          <button class="ghost" id="toggleHistoryBtn">Mostrar / ocultar</button>
        </div>

        <div id="historyContent" class="hidden" style="margin-top:16px;">
          <div class="grid">
            <div class="col-6 chart-card">
              <div class="card">
                <h3>Minha preparação prévia</h3>
                <div class="chart-wrap"><canvas id="chartPreparacao"></canvas></div>
              </div>
            </div>

            <div class="col-6 chart-card">
              <div class="card">
                <h3>Minha motivação prévia</h3>
                <div class="chart-wrap"><canvas id="chartMotivacao"></canvas></div>
              </div>
            </div>

            <div class="col-6 chart-card">
              <div class="card">
                <h3>Meu estado físico na gravação</h3>
                <div class="chart-wrap"><canvas id="chartFisico"></canvas></div>
              </div>
            </div>

            <div class="col-6 chart-card">
              <div class="card">
                <h3>Meu estado mental/emocional na gravação</h3>
                <div class="chart-wrap"><canvas id="chartMental"></canvas></div>
              </div>
            </div>

            <div class="col-6 chart-card">
              <div class="card">
                <h3>Infraestrutura funcionando na gravação</h3>
                <div class="chart-wrap"><canvas id="chartInfraestrutura"></canvas></div>
              </div>
            </div>

            <div class="col-6 chart-card">
              <div class="card">
                <h3>Minha satisfação final</h3>
                <div class="chart-wrap"><canvas id="chartSatisfacao"></canvas></div>
              </div>
            </div>
          </div>

          <div class="filter-toggle">
            <button class="ghost" id="toggleFiltersBtn">Filtrar histórico</button>
          </div>

          <div id="filtersBlock" class="hidden">
            <div class="filter-grid">
              ${renderFilterSelect("fLocalInstitution", "Local/Instituição", localInstitutionValues)}
              ${renderFilterSelect("fYearLevel", "Ano/Semestre Letivo; Ciclo; Módulo", yearLevelValues)}
              ${renderFilterSelect("fCourseId", "Identificação do Curso", courseIdValues)}
              ${renderFilterSelect("fClassId", "Identificação da Turma", classIdValues)}
              ${renderFilterSelect("fSubject", "Disciplina", subjectValues)}
              ${renderFilterSelect("fTopicObjective", "Tema/Objetivo do Encontro", topicObjectiveValues)}
              ${renderFilterSelect("fSpecificStudents", "Aluno(s) Específico(s)", specificStudentsValues)}
            </div>
          </div>

          <div class="card" style="margin-top:16px;">
            <strong>Últimas aulas</strong>
            <div id="historyLessons" style="margin-top:12px;"></div>
          </div>

          <div class="card hidden" id="historyLessonDetail"></div>
        </div>
      </div>
    `;

    document.getElementById("toggleHistoryBtn").onclick = async () => {
      document.getElementById("historyContent").classList.toggle("hidden");
      if (!document.getElementById("historyContent").classList.contains("hidden")) {
        await wireHistory();
      }
    };
  }

  function renderFilterSelect(id, label, values) {
    return `
      <div>
        <label>${label}</label>
        <select id="${id}">
          <option value="">Todos</option>
          ${values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("")}
        </select>
      </div>
    `;
  }

  async function renderPendingButton() {
    const all = await getAllRecords();
    const pending = all.filter(x => x.analysisStatus === "pending");
    if (!pending.length || !navigator.onLine) {
      return;
    }

    postRecordBlock.classList.remove("hidden");
    postRecordBlock.innerHTML = `
      <div class="card pending-card">
        <div class="top-line">
          <strong>Gravações pendentes</strong>
          <span class="small">${pending.length} pendente(s)</span>
        </div>
        <div class="small" style="margin-top:8px;">Há gravações aguardando análise.</div>
        <div class="controls">
          <button class="primary" id="analyzePendingBtn">Analisar aula pendente</button>
        </div>
      </div>
    `;

    document.getElementById("analyzePendingBtn").onclick = async () => {
      const list = (await getAllRecords()).filter(x => x.analysisStatus === "pending");
      for (const item of list) {
        await analyzeRecord(item.id);
      }
    };
  }

  async function startRecording() {
    instructionsCard.classList.remove("hidden");
    postRecordBlock.classList.add("hidden");
    analysisBlock.classList.add("hidden");
    chunks = [];

    stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false
      }
    });

    const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
      ? "audio/webm;codecs=opus"
      : "audio/webm";

    recorder = new MediaRecorder(stream, { mimeType });
    recorder.ondataavailable = (e) => {
      if (e.data.size > 0) chunks.push(e.data);
    };
    recorder.start();

    startTime = Date.now();
    startBtn.disabled = true;
    stopBtn.disabled = false;
    statusLive.textContent = "Gravação em andamento";

    timerInterval = setInterval(() => {
      timerEl.textContent = fmtDuration(Math.floor((Date.now() - startTime) / 1000));
    }, 500);
  }

  async function stopRecording() {
    stopBtn.disabled = true;
    statusLive.textContent = "Gravação encerrada";

    recorder.stop();

    recorder.onstop = async () => {
      clearInterval(timerInterval);
      stream.getTracks().forEach((t) => t.stop());

      const blob = new Blob(chunks, { type: chunks[0]?.type || "audio/webm" });
      const cfg = getConfig();

      const record = {
        id: "gravacao_" + Date.now(),
        createdAt: new Date().toISOString(),
        config: cfg,
        transcript: "",
        tldr: "",
        gagne: [],
        socio: {
          preparacao: 5,
          motivacao: 5,
          fisico: 5,
          mental: 5,
          infraestrutura: 5,
          satisfacao: 5
        },
        socioSaved: false,
        specialAnalysis: null,
        specialAnalysisCount: 0,
        recorded: true,
        audioSizeBytes: blob.size,
        analysisStatus: navigator.onLine ? "recorded" : "pending"
      };

      await saveAudioBlob(record.id, blob);
      await putRecord(record);

      instructionsCard.classList.add("hidden");
      renderPostRecord(record);
      await renderHistory();

      timerEl.textContent = "00:00";
      startBtn.disabled = false;
    };
  }

  toggleConfigBtn?.addEventListener("click", () => {});

  startBtn.onclick = startRecording;
  stopBtn.onclick = stopRecording;

  window.addEventListener("online", async () => {
    renderConnectionStatus();
    await renderPendingButton();
  });

  window.addEventListener("offline", () => {
    renderConnectionStatus();
  });

  async function init() {
    await migrateLegacyHistoryIfNeeded();
    renderConnectionStatus();
    await renderHistory();
    await renderPendingButton();
  }

  init();
</script>
</body>
</html>
